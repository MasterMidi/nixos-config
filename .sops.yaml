creation_rules:
  # Kubernetes Secrets (Specific Hosts + Admin)
  - path_regex: k8s\/.*\.(yml|yaml|json|env|ini|conf)$
    key_groups:
    - age:
      - *michael

  # Host-Specific Secrets (Only that Host + Admin)
  - path_regex: hosts\/meridian\/secrets\/.*\.(yml|yaml|json|env|ini|conf)$
    key_groups:
    - age:
      - *michael
      - *meridian

  - path_regex: hosts\/zenith\/secrets\/.*\.(yml|yaml|json|env|ini|conf)$
    key_groups:
    - age:
      - *michael
      - *zenith

  - path_regex: hosts\/david\/secrets\/.*\.(yml|yaml|json|env|ini|conf)$
    key_groups:
    - age:
      - *michael
      - *david

  - path_regex: hosts\/andromeda\/secrets\/.*\.(yml|yaml|json|env|ini|conf)$
    key_groups:
    - age:
      - *michael
      - *andromeda

  - path_regex: hosts\/aether\/secrets\/.*\.(yml|yaml|json|env|ini|conf)$
    key_groups:
    - age:
      - *michael
      - *aether

  - path_regex: hosts\/pisces\/secrets\/.*\.(yml|yaml|json|env|ini|conf)$
    key_groups:
    - age:
      - *michael
      - *pisces

  - path_regex: hosts\/hyperion\/secrets\/.*\.(yml|yaml|json|env|ini|conf)$
    key_groups:
    - age:
      - *michael
      - *hyperion

  # Shared Secets (All Hosts + Admin)
  - path_regex: secrets\/.*\.(yml|yaml|json|env|ini|conf)$
    key_groups:
    - age:
      - *michael
      - *meridian
      - *zenith
      - *david
      - *andromeda
      - *aether
      - *pisces
      - *hyperion

  # Catch-all Random Secrets
  - path_regex: .*\.(yml|yaml|json|env|ini|conf)$
    key_groups:
    - age:
      - *michael
      - *meridian
      - *zenith
      - *david
      - *andromeda
      - *aether
      - *pisces
      - *hyperion
