apiVersion: v1
kind: Namespace
metadata:
  name: media-stack
---
#################################################################
# Sonarr (TV)
#################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      containers:
        - name: sonarr
          image: ghcr.io/hotio/sonarr:nightly
          env:
            - name: PUID
              value: "1000" # <-- CHANGE THIS
            - name: PGID
              value: "100" # <-- CHANGE THIS
            - name: TZ
              value: "Europe/Copenhagen" # <-- CHANGE THIS
          ports:
            - containerPort: 8989
          volumeMounts:
            - name: config
              mountPath: /config
            - name: storage
              mountPath: /storage # /storage/media and /storage/torrents
      volumes:
        - name: config
          hostPath:
            path: /mnt/ssd/appdata/sonarr # Configs on SSD
            type: DirectoryOrCreate
        - name: storage
          hostPath:
            path: /mnt/hdd # Media/Torrents on HDD
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: media-stack
spec:
  ports:
    - port: 8989
      targetPort: 8989
  selector:
    app: sonarr
---
